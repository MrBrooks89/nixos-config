# ~/.config/starship.toml 

add_newline = false
command_timeout = 1000

format = """
$character\
$os$hostname\
$directory\
$git_branch\
$git_status \
$python\
$aws\
$golang\
$java\
$nodejs\
$fill\
(#1C3A5E)(#1C3A5E)$cmd_duration
[в””в”Җ>](bold green) """


continuation_prompt = 'в–¶в–¶ '

[character]
success_symbol = "рҹҡҖ "
error_symbol = "рҹ”Ҙ "

[fill]
symbol = " "

[time]
disabled = false
time_format = "%r" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ уұ‘Қ $time ](bg:#1C3A5E fg:#8DFBD2)]($style)'

[cmd_duration]
format = 'last command: [$duration](bold yellow)'

# ---

[os]
format = '[$symbol](bold white) '
disabled = false

[os.symbols]
Macos = 'у°Җө'

# Shows the hostname
[hostname]
ssh_only = false
format = 'on [$hostname](bold yellow) '
disabled = false
ssh_symbol = "о¬Ғ "

# Shows current directory
[directory]
truncation_length = 3
fish_style_pwd_dir_length=2
home_symbol = 'у°Ӣң ~'
read_only_style = '197'
read_only = ' пҖЈ '
format = 'at [$path]($style)[$read_only]($read_only_style) '

# Shows current git branch
[git_branch]
symbol = "пҗҳ "
format = 'via [$symbol$branch]($style)'
# truncation_length = 4
truncation_symbol = 'вҖҰ/'
style = 'bold red'

# Shows current git status
[git_status]
format = '[$all_status$ahead_behind]($style) '
style = 'bold green'
conflicted = 'рҹҸі'
up_to_date = ''
untracked = 'п”© '
ahead = 'вҮЎ${count}'
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
behind = 'вҮЈ${count}'
stashed = 'пЈ– '
modified = 'пҒ„ '
staged = '[++\($count\)](green)'
renamed = 'пӘ¶ '
deleted = 'пҖ” '


# ---

[aws]
symbol = "оҢҪ  "

[buf]
symbol = "п’қ "

[c]
symbol = "оҳһ "

[conda]
symbol = "п„Ң "

[dart]
symbol = "оһҳ "

[docker_context]
symbol = "пҢҲ "

[golang]
symbol = "оҳ§ "

[java]
symbol = "оү– "

[lua]
symbol = "оҳ  "

[memory_usage]
symbol = "у°Қӣ "
disabled = true
style='bold dimmed white'
threshold = 1
format = "$symbol [${ram}(|${swap})]($style) "

[nodejs]
symbol = "оңҳ "

[package]
symbol = "у°Ҹ— "

[pijul_channel]
symbol = "пҗҳ "

[python]
symbol = "оҲө "
pyenv_version_name = true

[ruby]
symbol = "оһ‘ "

[rlang]
symbol = "у°ҹ” "

[rust]
symbol = "оһЁ "

[scala]
symbol = "оң· "
